<div class="col pt-3 pb-3 p-5">
  <div class="row mb-3">
    <div class="col-md-12">
      <button (click)="fileInput.click()" style="background-color: transparent; border: none">
        <img [src]="articleDto.photo ? articleDto.photo : 'assets/new_product.png'"  [src]="imgUrl"
             class="rounded-circle"
             width="200px" height="200px"
             style="object-fit: cover; border: 2px solid #007bff; cursor: pointer;"/>
        <input hidden type="file" #fileInput (change)="onFileInput(fileInput.files)" accept="image/*">
      </button>
    </div>

<!--    <div class="col-md-6">-->
<!--      <button class="btn btn-primary" (click)="enregistrerArticle()">-->
<!--        <i class="fa-solid fa-circle-info green-color"></i>&nbsp;-->
<!--        Code disponible-->
<!--      </button>-->
<!--    </div>-->

  </div>
  <hr>
  <div class="col-md-12">
    <div class="col-md-12">
      <h2><i class="fa-solid fa-circle-info blue-color"></i>&nbsp;Information de l'article</h2>
    </div>

    <div class="col-md-12">
      <div class="alert alert-danger" *ngIf="errorMsg.length > 0">
        <div *ngFor="let msg of errorMsg">
          <span >{{msg}}</span>
        </div>
      </div>
      <form action="">
        <div class="row mb-3">
          <div class="col-md-3">
            <label>Code Article (Généré automatiquement)</label>
          </div>
          <div class="col-md-3">
            <input type="text"
                   class="form-control bg-light"
                   name="codearticle"
                   [(ngModel)]="articleDto.codeArticle"
                   readonly>
<!--            <input type="text" class="form-control" name="codearticle" placeholder="Code article: format (ART****)"-->
<!--                   aria-label="Code article"-->
<!--                   [(ngModel)]="articleDto.codeArticle"-->
<!--                   (blur)="verifierCodeArticle()">-->

          </div>
          <div class="col-md-6">
            <input type="text" class="form-control" name="designation" placeholder="Designation"
                   aria-label="Designation" [(ngModel)]="articleDto.designation">
          </div>
        </div>
        <div class="row mb-3">
          <div class="col-md-6">
            <input type="text" class="form-control" name="format" placeholder="FormatConditionnement"
                   aria-label="Format" [(ngModel)]="articleDto.format">
          </div>
          <div class="col-md-3">
            <input type="text" class="form-control" name="prixachatunitht" placeholder="Prix achat unitaire HT"
                   aria-label="Prix achat unitaire HT" (input)="calculerTTC()" [(ngModel)]="articleDto.prixUnitaireHt ">
          </div>
          <div class="col-md-3">
            <input type="text" class="form-control" name="prixventeunitht" placeholder="Prix  vente unitaire HT"
                   aria-label="Prix unitaire HT" (input)="calculerTTC()" [(ngModel)]="articleDto.prixVenteUnitaireHt ">
          </div>
        </div>
        <div class="row mb-3">
          <div class="col-md-6">
            <input type="text" class="form-control" name="tauxtva" placeholder="Taux TVA"
                   aria-label="Taux TVA" (input)="calculerTTC()" [(ngModel)]="articleDto.tauxTva">
          </div>
          <div class="col-md-3">
            <input type="text" class="form-control" name="prixachatunitttc" placeholder="Prix achat unitaire TTC"
                   aria-label="Prix achat unitaire TTC" [(ngModel)]="articleDto.prixUnitaireTtc" readonly>
          </div>
          <div class="col-md-3">
            <input type="text" class="form-control" name="prixventeunitttc" placeholder="Prix vente unitaire TTC"
                   aria-label="Prix vente unitaire TTC" [(ngModel)]="articleDto.prixVenteUnitaireTtc" readonly>
          </div>
        </div>
        <div class="row mb-3">
          <div class="col">
            <div class="col">
              <div class="col">
                <textarea
                  class="form-control description-area" name="description" placeholder="Description"
                  aria-label="Description" [(ngModel)]="articleDto.description"
                  cdkTextareaAutosize cdkAutosizeMinRows="1" cdkAutosizeMaxRows="5">
                </textarea>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <select class="form-select form-select-sm" name="cat" placeholder="Type catégorie"
                    aria-label="choix categorie" [(ngModel)]="categorieDto.id">
              <option selected>Selectionner une categorie</option>
              <option *ngFor="let cat of listeCategorie" [value]="cat.id">{{cat.code}} - {{cat.designation}}</option>
            </select>
          </div>
        </div>
      </form>
    </div>
  </div>
  <div class="col-md-12 text-end">
    <button class="btn btn-danger me-3" (click)="cancelClick()">
      <i class="fa-solid fa-ban"></i>&nbsp;
      Annuler
    </button>
    <button class="btn btn-primary" (click)="enregistrerArticle()">
      <i class="fa-solid fa-save"></i>&nbsp;
      Enregistrer
    </button>
  </div>

</div>
