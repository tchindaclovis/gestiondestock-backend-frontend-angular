<div class="modal fade show" style="display: block; background: rgba(0,0,0,0.5);" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
    <div class="modal-content shadow-lg">

      <div class="modal-header bg-light">
        <h5 class="modal-title">
          <i class="fa-solid fa-circle-info text-primary"></i>&nbsp; Information de l'article
        </h5>
        <button type="button" class="btn-close" (click)="cancelClick()" aria-label="Close"></button>
      </div>

      <div class="modal-body p-4" style="max-height: 75vh; overflow-y: auto;">

        <div class="text-center mb-4">
          <button (click)="fileInput.click()" class="btn p-0 border-0 bg-transparent">
            <img [src]="articleDto.photo ? articleDto.photo : 'assets/new_product.png'"
                 [src]="imgUrl"
                 class="rounded-circle shadow-sm"
                 width="150px" height="150px"
                 style="object-fit: cover; border: 3px solid #007bff; cursor: pointer;"/>
            <input hidden type="file" #fileInput (change)="onFileInput(fileInput.files)" accept="image/*">
            <p class="text-muted small mt-2">Cliquer pour changer l'image</p>
          </button>
        </div>

        <hr>

        <div class="alert alert-danger" *ngIf="errorMsg.length > 0">
          <div *ngFor="let msg of errorMsg">
            <span>{{msg}}</span>
          </div>
        </div>

        <form>
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label small fw-bold">Code Article (Auto)</label>
              <input type="text" class="form-control bg-light" name="codearticle" [(ngModel)]="articleDto.codeArticle" readonly>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">Désignation</label>
              <input type="text" class="form-control" name="designation" placeholder="Désignation" [(ngModel)]="articleDto.designation">
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label small fw-bold">Format Conditionnement</label>
              <input type="text" class="form-control" name="format" placeholder="Format" [(ngModel)]="articleDto.format">
            </div>
            <div class="col-md-3">
              <label class="form-label small fw-bold">Prix Achat HT</label>
              <input type="number" class="form-control" name="prixachatunitht" (input)="calculerTTC()" [(ngModel)]="articleDto.prixUnitaireHt">
            </div>
            <div class="col-md-3">
              <label class="form-label small fw-bold">Prix Vente HT</label>
              <input type="number" class="form-control" name="prixventeunitht" (input)="calculerTTC()" [(ngModel)]="articleDto.prixVenteUnitaireHt">
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label small fw-bold">Taux TVA (%)</label>
              <input type="number" class="form-control" name="tauxtva" placeholder="Ex: 19.25" (input)="calculerTTC()" [(ngModel)]="articleDto.tauxTva">
            </div>
            <div class="col-md-3">
              <label class="form-label small fw-bold">Prix Achat TTC</label>
              <input type="text" class="form-control bg-light" name="prixachatunitttc" [(ngModel)]="articleDto.prixUnitaireTtc" readonly>
            </div>
            <div class="col-md-3">
              <label class="form-label small fw-bold">Prix Vente TTC</label>
              <input type="text" class="form-control bg-light" name="prixventeunitttc" [(ngModel)]="articleDto.prixVenteUnitaireTtc" readonly>
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label small fw-bold">Description</label>
              <textarea class="form-control" name="description" placeholder="Description"
                        [(ngModel)]="articleDto.description" rows="2"></textarea>
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">Catégorie</label>
              <select class="form-select" name="cat" [(ngModel)]="categorieDto.id">
                <option [ngValue]="undefined" selected disabled>Sélectionner une catégorie</option>
                <option *ngFor="let cat of listeCategorie" [value]="cat.id">{{cat.code}} - {{cat.designation}}</option>
              </select>
            </div>
          </div>
        </form>
      </div>

      <div class="modal-footer bg-light">
        <button type="button" class="btn btn-danger me-2" (click)="cancelClick()">
          <i class="fa-solid fa-ban"></i>&nbsp; Annuler
        </button>
        <button type="button" class="btn btn-primary" (click)="enregistrerArticle()">
          <i class="fa-solid fa-save"></i>&nbsp; Enregistrer
        </button>
      </div>

    </div>
  </div>
</div>
