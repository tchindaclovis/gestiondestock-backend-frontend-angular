<div class="modal fade show" style="display: block; background: rgba(0,0,0,0.5);" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-xl modal-dialog-centered" role="document">
    <div class="modal-content shadow-lg">

      <div class="modal-header bg-light">
        <h5 class="modal-title">
          <i class="fa-solid fa-cash-register text-primary"></i>&nbsp; Nouvelle vente
        </h5>
        <button type="button" class="btn-close" (click)="cancelClick()" aria-label="Close"></button>
      </div>

      <div class="modal-body p-4" style="max-height: 80vh; overflow-y: auto;">

        <div class="alert alert-danger" *ngIf="errorMsg.length">
          <div *ngFor="let msg of errorMsg">
            <span> {{ msg }} </span>
          </div>
        </div>

        <div class="row p-3 mb-3 mx-1 bg-white border rounded shadow-sm">
          <div class="col-md-5 border-end">
            <form>
              <div class="row mb-3">
                <div class="col-md-7">
                  <label class="form-label small fw-bold">Code Vente (Auto)</label>
                  <input type="text" class="form-control bg-light" name="codeVente" [(ngModel)]="codeVente" readonly>
                </div>
              </div>


              <div class="col-md-12">
                <label class="form-label small fw-bold">Mode de paiement</label>
                <select class="form-select" name="paymentType" [(ngModel)]="venteDto.paymentType">
                  <option [ngValue]="undefined" selected disabled>Sélectionner un mode de paiement</option>
                  <option *ngFor="let type of paymentTypesOptions" [value]="type">
                    {{ type.replace('_', ' ') | titlecase }}
                  </option>
                </select>
              </div>

              <div class="mb-0">
                <label class="form-label small fw-bold">Client</label>
                <select class="form-select" name="clientFournisseur" [(ngModel)]="selectedClientFournisseur" [compareWith]="compareFn">
                  <option [ngValue]="null">Sélectionner un client</option>
                  <option *ngFor="let obj of listClients" [ngValue]="obj">
                    {{ obj.nom }}&nbsp;{{ obj.statut }}
                  </option>
                </select>
              </div>
            </form>
          </div>

          <div class="col-md-5 border-end" *ngIf="selectedClientFournisseur?.id">
            <div class="ps-3 pt-2">
              <div class="d-flex mb-1"><i class="fa-solid fa-user blue-color me-2"></i> <strong>{{ selectedClientFournisseur.nom }}</strong></div>
              <div class="d-flex mb-1"><i class="fa-solid fa-tag blue-color me-2"></i> {{ selectedClientFournisseur.statut }}</div>
              <div class="d-flex mb-1"><i class="fa-solid fa-phone blue-color me-2"></i> {{ selectedClientFournisseur.numTel }}</div>
              <div class="d-flex"><i class="fa-solid fa-clock text-primary me-2"></i> <span class="badge bg-soft-primary">EN PREPARATION</span></div>
            </div>
          </div>
          <div class="col-md-2 text-center" *ngIf="selectedClientFournisseur?.id">
            <img [src]="selectedClientFournisseur.photo ? selectedClientFournisseur.photo: 'assets/product.png'"
                 class="rounded-circle border" width="120px" height="120px" style="object-fit: cover;" />
          </div>
        </div>

        <div class="row p-3 mb-3 mx-1 bg-light border rounded align-items-end">
          <div class="col-md-4 position-relative">
            <label class="form-label small fw-bold">Article</label>
            <input type="text" class="form-control" name="codeArticle" placeholder="Rechercher article..."
                   [(ngModel)]="codeArticle" (input)="filtrerArticle()">

            <div *ngIf="codeArticle.length && !articleNotYetSelected"
                 class="list-group position-absolute w-100 shadow" style="z-index: 1050; max-height: 200px; overflow-y: auto;">
              <button type="button" class="list-group-item list-group-item-action"
                      *ngFor="let article of listArticle" (click)="selectArticleClick(article)">
                {{ article.codeArticle }} - {{ article.designation }}
              </button>
            </div>
          </div>
          <div class="col-md-3">
            <label class="form-label small fw-bold">Quantité</label>
            <input type="number" class="form-control" name="quantite" [(ngModel)]="quantite">
          </div>
          <div class="col-md-4">
            <label class="form-label small fw-bold">Prix de vente TTC</label>
            <input type="text" class="form-control bg-white" name="prixVente" readonly
                   [(ngModel)]="searchedArticle.prixVenteUnitaireTtc">
          </div>
          <div class="col-md-1">
            <button type="button" class="btn btn-success w-100" (click)="ajouterLigneVente()">
              <i class="fa-solid fa-plus"></i>
            </button>
          </div>
        </div>

        <div class="p-2 border rounded bg-white shadow-sm" style="max-height: 300px; overflow-y: auto;">
          <app-detail-vente
            *ngFor="let ligne of listeLignesVente"
            [ligneVente]="ligne"
            [origin]="origin">
          </app-detail-vente>
          <div *ngIf="!listeLignesVente.length" class="text-center p-4 text-muted">
            <p><i class="fa-solid fa-receipt fa-2x mb-2"></i><br>Aucun article dans cette vente</p>
          </div>
        </div>

      </div>

      <div class="modal-footer d-flex justify-content-between bg-light">
        <div class="h4 mb-0 text-success fw-bold">
          Total Vente : {{ totalVente | currency:'XAF':'symbol':'1.0-0':'fr' }}
        </div>
        <div>
          <button class="btn btn-danger me-2" (click)="cancelClick()">
            <i class="fa-solid fa-ban"></i>&nbsp; Annuler
          </button>
          <button class="btn btn-primary" (click)="enregistrerVente()" [disabled]="!listeLignesVente.length">
            <i class="fa-solid fa-save"></i>&nbsp; Enregistrer la vente
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
