<div class="col pt-3 pb-3 p-5">
  <div class="col-md-12">
    <div class="col-md-12">
      <h2>Nouvelle vente</h2>
    </div>

    <div class="alert alert-danger" *ngIf="errorMsg.length">
      <div *ngFor="let msg of errorMsg">
        <span> {{ msg }} </span>
      </div>
    </div>

    <div class="row p-3 mb-2 mt-3 custom-border">
      <div class="col-md-5 border-end">
        <form>
          <div class="row mb-3">
            <div class="col-md-7">
              <label>Code Vente (automatique)</label>
            </div>
            <div class="col-md-5">
              <input type="text" class="form-control" name="codeVente" placeholder="Code vente"
                     [(ngModel)]="codeVente"
                     readonly>
            </div>
          </div>
          <div class="mb-3">
            <input type="text" class="form-control" name="commentaireVte" placeholder="Commentaire"
                   [(ngModel)]="commentaire">
          </div>

          <div class="mb-0">
            <!-- Correction 1 : Liaison avec selectedClientFournisseur + compareWith -->
            <select class="form-select form-control"
                    name="clientFournisseur"
                    [(ngModel)]="selectedClientFournisseur"
                    [compareWith]="compareFn">
              <option [ngValue]="null">Selectionner un {{ origin }}</option>
              <option *ngFor="let obj of listClients" [ngValue]="obj">
                {{ obj.nom }}&nbsp;{{ obj.statut }}
              </option>
            </select>
          </div>
        </form>
      </div>

      <!-- Correction 2 : On affiche les détails seulement si un client/fournisseur est sélectionné -->
      <div class="col-md-5 border-end" *ngIf="selectedClientFournisseur?.id">
        <div class="col">
          <div class="row">
            <div class="col-md-1"><i class="fa-solid fa-circle-info blue-color"></i></div>
            <div class="col-md-11">{{ selectedClientFournisseur.nom }}</div>
          </div>
          <div class="row">
            <div class="col-md-1"><i class="fa-solid fa-circle-info blue-color"></i></div>
            <div class="col-md-11">{{ selectedClientFournisseur.statut }}</div>
          </div>
          <div class="row">
            <div class="col-md-1"><i class="fa-solid fa-phone blue-color"></i></div>
            <div class="col-md-11">{{ selectedClientFournisseur.numTel }}</div>
          </div>
          <div class="row">
            <div class="col-md-1"><i class="fa-solid fa-hourglass-half blue-color"></i></div>
            <div class="col-md-11 text-primary">EN PREPARATION</div>
          </div>
        </div>
      </div>
      <div class="col-md-2 text-center" *ngIf="selectedClientFournisseur?.id">
        <img [src]="selectedClientFournisseur.photo ? selectedClientFournisseur.photo: 'assets/product.png'"
             class="rounded-circle" width="150px" height="150px" />
      </div>
    </div>
  </div>

  <div class="row p-3 mb-2 custom-border">
    <div class="row">
      <div class="col-md-4">
        <input type="text" class="form-control" name="codeArticle" placeholder="Code article"
               [(ngModel)]="codeArticle" (input)="filtrerArticle()">
        <!-- Autocomplétion : affichée tant qu'aucun article n'est sélectionné -->
        <div *ngIf="codeArticle.length && !articleNotYetSelected" class="autocomplete shadow p-3 mb-5 bg-white rounded">
          <p class="p-1" *ngFor="let article of listArticle" (click)="selectArticleClick(article)">
            {{ article.codeArticle }}&nbsp; {{ article.designation }}
          </p>
        </div>
      </div>
      <div class="col-md-4">
        <input type="text" class="form-control" name="quantite" placeholder="Quantite"
               [(ngModel)]="quantite">
      </div>
      <div class="col-md-3">
        <input type="text" class="form-control" name="prixVente"
               placeholder="Prix de vente"
               [(ngModel)]="searchedArticle.prixVenteUnitaireTtc">
      </div>
      <div class="col-md-1">
        <button type="button" class="btn btn-success" (click)="ajouterLigneVente()">
          <i class="fa-solid fa-plus"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="row p-3 custom-border" style="max-height: 300px; overflow-y: scroll;">
    <app-detail-vente
      *ngFor="let ligne of listeLignesVente"
      [ligneVente]="ligne"
      [origin]="origin">
    </app-detail-vente>
  </div>

  <div class="row mt-2 mb-3 custom-border text-end">
    <h4>Total de la vente: {{ totalVente | currency:'XAF':'symbol':'1.0-0':'fr' }}</h4>
  </div>
  <div class="col-md-12 text-end">
    <button class="btn btn-danger me-3" (click)="cancelClick()">
      <i class="fa-solid fa-ban"></i>&nbsp;
      Annuler
    </button>
    <button class="btn btn-primary" (click)="enregistrerVente()">
      <i class="fa-solid fa-save"></i>&nbsp;
      Enregistrer
    </button>
  </div>
</div>
