<div class="col pt-3 pb-3 p-5">
  <div class="col-md-12">
    <div class="col-md-12 mb-3">
      <h2>Nouvelle categorie</h2>
    </div>

    <div class="col-md-12">
      <div class="alert alert-danger" *ngIf="errorMsg.length > 0">
        <div *ngFor="let msg of errorMsg">
          <span >{{ msg }}</span>
        </div>
      </div>
      <form action="">
        <div class="row mb-3">
          <div class="col">
            <input type="text" class="form-control" placeholder="Code category" aria-label="Code category" name="codeCat"
            [(ngModel)]="categoryDto.code">
          </div>
        </div>
        <div class="row mb-3">
          <div class="col">
            <input type="text" class="form-control" placeholder="Designation" aria-label="Designation" name="descriptionCat"
            [(ngModel)]="categoryDto.designation">
          </div>
        </div>
      </form>
    </div>
  </div>
  <div class="col-md-12 text-end">
    <button class="btn btn-danger me-3" (click)="cancelClick()">
      <i class="fa-solid fa-ban"></i>&nbsp;
      Annuler
    </button>
    <button class="btn btn-primary" (click)="enregistrerCategory()">
      <i class="fa-solid fa-save"></i>&nbsp;
      Enregistrer
    </button>
  </div>
</div>
