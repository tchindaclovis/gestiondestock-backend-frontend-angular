<div class="modal fade show" style="display: block; background: rgba(0,0,0,0.5);" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Nouvelle catégorie</h5>
        <button type="button" class="btn-close" aria-label="Close" (click)="cancelClick()"></button>
      </div>

      <div class="modal-body p-4">
        <div class="alert alert-danger" *ngIf="errorMsg.length > 0">
          <div *ngFor="let msg of errorMsg">
            <span>{{ msg }}</span>
          </div>
        </div>

        <form>
          <div class="row mb-3">
            <div class="col">
              <label class="form-label">Code catégorie</label>
              <input type="text" class="form-control" placeholder="Ex: CAT-001" name="codeCat"
                     [(ngModel)]="categoryDto.code">
            </div>
          </div>
          <div class="row mb-3">
            <div class="col">
              <label class="form-label">Désignation</label>
              <input type="text" class="form-control" placeholder="Désignation" name="designationCat"
                     [(ngModel)]="categoryDto.designation">
            </div>
          </div>
          <div class="row mb-3">
            <div class="col">
              <label class="form-label">Description</label>
              <textarea class="form-control" placeholder="Description de la catégorie" name="descriptionCat"
                        [(ngModel)]="categoryDto.description" rows="3"></textarea>
            </div>
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-danger" (click)="cancelClick()">
          <i class="fa-solid fa-ban"></i>&nbsp;Annuler
        </button>
        <button type="button" class="btn btn-primary" (click)="enregistrerCategory()">
          <i class="fa-solid fa-save"></i>&nbsp;Enregistrer
        </button>
      </div>

    </div>
  </div>
</div>
