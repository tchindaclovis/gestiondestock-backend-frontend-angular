<div class="row m-3">
  <div class="card col-md-6 text-center">
    <div class="col">
      <div class="mb-3 mt-3">
        <img [src]="connectedUser?.photo || 'assets/profil.png'" class="rounded-circle" width="400px" height="200px">
      </div>
    </div>
    <div class="mb-3">
      <h2>
        <span *ngIf="connectedUser !== null">
          <!--Interpolation Angular {{ }}
            Affiche dynamiquement le nom de l’utilisateur connecté-->
          {{ connectedUser.nom }}
          <small class="form-text text-auted small-size">{{ connectedUser.statut }}</small>
        </span>
      </h2>
      <small class="form-text text-auted">
        {{ connectedUser?.adresse?.adresse1 }} {{ connectedUser?.adresse?.adresse2 }} //
        {{ connectedUser?.adresse?.codePostale }} {{ connectedUser?.adresse?.ville }}
      </small>
    </div>
  </div>

  <div class="card col-md-6">
    <form class="m-lg-3">
      <div class="row mb-3 mt-3">
        <div class="col-md-4">
          <label>Email:</label>
        </div>
        <div class="col-md-8 form-group">
          <input type="email" class="form-control"  name="email"
                 [(ngModel)]="connectedUser!.email">
        </div>
      </div>

      <div class="row mb-3 mt-3">
        <div class="col-md-4">
          <label>Ancien mot de passe:</label>
        </div>
        <div class="col-md-8 form-group">
          <input type="password" class="form-control"  name="ancienmotdepasse"
                 [(ngModel)]="ancienMotDePasse">
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-4">
          <label>Nouveau mot de passe:</label>
        </div>
        <div class="col-md-8 form-group">
          <input type="password" class="form-control"  name="nouveaumotdepasse"
                 [(ngModel)]="changerMotDePasseDto.motDePasse">
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-4">
          <label>Confirmer mot de passe:</label>
        </div>

        <div class="col-md-8 form-group">
          <input type="password" class="form-control"  name="confirmermotdepasse"
                 [(ngModel)]="changerMotDePasseDto.confirmMotDePasse">
        </div>
      </div>
    </form>


    <div class="row text-right m-1">
      <div class="col-md-12 text-end">
        <button class="btn btn-danger me-3" (click)="cancelClick()">
          <i class="fa-solid fa-ban"></i>&nbsp;
          Annuler
        </button>
        <button class="btn btn-primary" (click)="changerMotDePasseUtilisateur()">
          <i class="fa-solid fa-save"></i>&nbsp;
          Enregistrer
        </button>
      </div>
    </div>
  </div>
</div>
