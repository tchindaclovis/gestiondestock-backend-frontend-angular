<div class="row m-3">

    </div>
    <div class="mb-3">

      <tr>

      </tr>
      <tr>

        <td>+237 658 21 20 25</td>
      </tr>
      <tr>
        <th scope="row">Adresse</th>
        <td>Adresse, ville, 12345</td>
      </tr>

      </tr>

      </tbody>
    </table>
