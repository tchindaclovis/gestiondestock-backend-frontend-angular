<div class="col">
  <div class="row ms-3 me-3 page_title">
    <div class="col-md-8 p-0">
      <h1>
        <span *ngIf="listClient.length > 0">Liste des clients ( {{ listClient.length }} )</span>
        <span *ngIf="listClient.length === 0">Aucun article disponible</span>
      </h1>
    </div>
    <div class="col-md-4 text-end">
      <app-boutton-action
        (clickEvent)="nouveauClient()">
      </app-boutton-action>
    </div>
    <div class="alert alert-danger" *ngIf="errorMsg">
      {{ errorMsg }}
    </div>
  </div>

  <div class="col mt-1 mb-1 ms-3 me-3 ps-3 pe-3 scroll-commandes article_list">
    <app-detail-client-fournisseur
      *ngFor="let client of listClient"
      [clientFournisseur]="client"
      [origin]="'client'"
      (suppressionResult)="handleSuppression($event)">
    </app-detail-client-fournisseur>
  </div>

  <div class="row mt-1 mb-1 ms-3 me-3 page_moving">
    <div class="text-center">
      <app-pagination></app-pagination>
    </div>
  </div>
</div>
