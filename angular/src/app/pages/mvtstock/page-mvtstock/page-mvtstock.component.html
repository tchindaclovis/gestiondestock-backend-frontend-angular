<div class="col">

  </div>

<!--  detail mouvement de stock 1-->

            </button>
          </h2>
        </div>
        <div id="collapseOne1" class="accordion-collapse collapse" aria-labelledby="headingOne1"

            <app-detail-mvtstock></app-detail-mvtstock>

  </div>
