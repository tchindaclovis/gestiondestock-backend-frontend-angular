<div class="accordion" id="accordionExample">
  <div class="accordion-item" *ngFor="let menu of menuProperties">
    <div class="card-header" id="menu{{menu.id}}">
      <h2 class="mb-0">
        <button class="accordion-button btn btn-link w-100 text-start souligner-au-survol bg-body-secondary" type="button"
                data-bs-toggle="collapse"
                [attr.data-bs-target]="'#collapse' + menu.id" aria-expanded="true" aria-controls="collapseOne">
          <i class="{{menu.icon}}"></i>&nbsp;
          {{menu.titre}}
        </button>
      </h2>
    </div>

    <div id="collapse{{menu.id}}"
         class="accordion-collapse collapse"
         [attr.aria-labelledby]="'heading' + menu.id"
         data-bs-parent="#accordionExample">
      <div class="accordion-body p-0">
        <ul class="list-group list-group-flush">
          <li class="list-group-item"
              *ngFor="let sousMenu of menu.sousMenu"
              [ngClass]="{'bg-primary-subtle': sousMenu.active, '': !sousMenu.active}">
            <a href="javascript:void(0);" (click)="navigate(sousMenu)" class="d-block text-success souligner-au-survol">
              <i class="{{sousMenu.icon}}"></i>&nbsp;
              {{sousMenu.titre}}
            </a>
          </li>
        </ul>
      </div>
    </div>

</div>
