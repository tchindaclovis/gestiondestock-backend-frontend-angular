<div class="col pt-3 pb-3 p-5">
  <div class="col-md-12">
    <div class="col-md-12">
      <h2>Nouvelle commande {{ origin }}</h2>
    </div>

    <!--    <div class="alert alert-danger" *ngIf="errorMsg && errorMsg.length">-->
    <div class="alert alert-danger" *ngIf="errorMsg.length">
      <div *ngFor="let msg of errorMsg">
        <span> {{ msg }} </span>
      </div>
    </div>

    <div class="row p-3 mb-2 mt-3 custom-border">
      <div class="col-md-5 border-end">
        <form>
          <div class="mb-3">
            <input type="text" class="form-control" name="codeCommande" placeholder="Code commande"
                   [(ngModel)]="codeCommande">
          </div>
          <div class="mb-3">
            <input type="text" class="form-control" placeholder="Date commande">
          </div>
          <div class="mb-0">
            <select class="form-select form-control" name="clientFournisseur"
                    [(ngModel)]="selectedClientFournisseur">
              <option>Selectionner un {{ origin }}</option>
              <option *ngFor="let obj of listClientsFournisseurs" [ngValue]="obj">
                {{ obj.nom }}&nbsp;{{ obj.prenom }}
              </option>
            </select>
          </div>
        </form>
      </div>

      <div class="col-md-5 border-end" *ngIf="selectedClientFournisseur.nom">
        <div class="col">
          <div class="row">
            <div class="col-md-1"><i class="fa-solid fa-circle-info blue-color"></i></div>
            <div class="col-md-11">{{ selectedClientFournisseur.nom }}</div>
          </div>
          <div class="row">
            <div class="col-md-1"><i class="fa-solid fa-circle-info blue-color"></i></div>
            <div class="col-md-11">{{ selectedClientFournisseur.prenom }}</div>
          </div>
          <div class="row">
            <div class="col-md-1"><i class="fa-solid fa-phone blue-color"></i></div>
            <div class="col-md-11">{{ selectedClientFournisseur.numTel }}</div>
          </div>
          <div class="row">
            <div class="col-md-1"><i class="fa-solid fa-hourglass-half blue-color"></i></div>
            <div class="col-md-11 text-primary">EN PREPARATION</div>
          </div>
        </div>
      </div>
      <div class="col-md-2 text-center" *ngIf="selectedClientFournisseur.nom">
        <img [src]="selectedClientFournisseur.photo ? selectedClientFournisseur.photo: 'assets/product.png'"
             class="rounded-circle" width="150px" height="150px" />
      </div>
    </div>
  </div>

  <div class="row p-3 mb-2 custom-border">
      <div class="row">
        <div class="col-md-4">
          <input type="text" class="form-control" name="codeArticle" placeholder="Code article"
                 [(ngModel)]="codeArticle" (input)="filtrerArticle()">
          <div *ngIf="codeArticle.length && !articleNotYetSelected" class="autocomplete shadow p-3 mb-5 bg-white rounded">
            <p class="p-1" *ngFor="let article of listArticle" (click)="selectArticleClick(article)">
              {{ article.codeArticle }}&nbsp; {{ article.designation }}
            </p>
          </div>
        </div>
        <div class="col-md-4">
          <input type="text" class="form-control" name="quantite" placeholder="Quantite"
                 [(ngModel)]="quantite">
        </div>
        <div class="col-md-3">
          <input type="text" class="form-control" name="prixUnitaire" placeholder="Prix unitaire"
                 [(ngModel)]="searchedArticle.prixUnitaireTtc">
        </div>
        <div class="col-md-1">
          <button type="button" class="btn btn-success" (click)="ajouterLigneCommande()"><i class="fa-solid fa-plus"></i></button>
        </div>
      </div>
  </div>

  <div class="row p-3 custom-border" style="max-height: 300px; overflow-y: scroll;">
    <app-detail-commande
      *ngFor="let ligne of lignesCommande" [ligneCommande]="ligne">
    </app-detail-commande>
  </div>

  <div class="row mt-2 mb-3 custom-border text-end">
    <h4>Total de la commande: {{ totalCommande }}</h4>
  </div>
  <div class="col-md-12 text-end">
    <button class="btn btn-danger me-3" (click)="cancelClick()">
      <i class="fa-solid fa-ban"></i>&nbsp;
      Annuler
    </button>
    <button class="btn btn-primary" (click)="enregistrerCommande()">
      <i class="fa-solid fa-save"></i>&nbsp;
      Enregistrer
    </button>
  </div>
</div>
