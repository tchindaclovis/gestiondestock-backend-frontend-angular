<!--photo utilisateur-->
<div class="row mb-1 custom-border">
  <div class="col-md-2 border-end p-1 text-center">
    <img [src]="utilisateurDto.photo ? utilisateurDto.photo : 'assets/product.png'"
         width="150px" height="50px"
         style="object-fit: cover; border-radius: 4px;"
         alt="Photo article">
  </div>

  <!--  details client ou fournisseur-->
  <div class="col-md-4 border-end mb-1 mt-1">
    <div class="col">
      <div class="row">
        <div class="col-md-1"><i class="fa-solid fa-circle-info blue-color"></i></div>
        <div class="col-md-11"><small>{{ utilisateurDto.nom }}</small></div>
      </div>
      <div class="row">
        <div class="col-md-1"><i class="fa-solid fa-circle-info blue-color"></i></div>
        <div class="col-md-11"><small>{{ utilisateurDto.statut }}</small></div>
      </div>
      <div class="row">
        <div class="col-md-1"><i class="fa-solid fa-phone blue-color"></i></div>
        <div class="col-md-11"><small>{{ utilisateurDto.email }}</small></div>
      </div>
    </div>
  </div>

  <!--  detail adresse client ou fournisseur-->
  <div class="col-md-3 border-end mb-1 mt-1">
    <div class="col">
      <div class="row">
        <div class="col-md-2">
          <small>
            <i class="fa-solid fa-house blue-color"></i>
          </small>
        </div>
        <div class="col-md-10">
          <small>
            {{ utilisateurDto.adresse?.adresse1 }}&nbsp;
            {{ utilisateurDto.adresse?.adresse2 }}
          </small>
        </div>
      </div>
      <div class="row">
        <div class="col-md-2">
          <small>
            <i class="fa-solid fa-location-dot blue-color"></i>
          </small>

        </div>
        <div class="col-md-10">
          <small>
            {{ utilisateurDto.adresse?.ville }}
          </small>
        </div>
      </div>
      <div class="row">
        <div class="col-md-2">
          <small>
            <i class="fa-solid fa-earth-africa blue-color"></i>
          </small>
        </div>
        <div class="col-md-10"><small>{{ utilisateurDto.adresse?.pays }}</small></div>
      </div>
    </div>
  </div>

  <!--  boutons action-->
  <div class="col-md-3">
    <div class="row pt-3 pb-0">
      <div class="col-md-4 text-center">
        <!--btn-outline-primary-->
        <button type="button" class="btn btn-link souligner-au-survol"
                (click)="modifierUtilisateur()"
                title="Modifier">
          <small>
            <i class="fa fa-edit icon-color-edit"></i>
<!--            <i class="fa-solid fa-pencil"></i>-->
          </small>
        </button>
      </div>
      <div class="col-md-4 text-center">
        <!--btn-outline-info-->
        <button type="button" class="btn  btn-link souligner-au-survol"
                (click)="appercuUtilisateur()"
                title="Aperçu">
          <small><i class="fa-solid fa-eye"></i></small>
        </button>
      </div>
      <div class="col-md-4 text-center">
        <!--btn-outline-danger-->
        <button type="button" class="btn btn-link souligner-au-survol text-danger" data-bs-toggle="modal"
                [attr.data-bs-target]="'#modalDeleteUti' + utilisateurDto.id"
                title="Supprimer">
          <small><i class="fa-solid fa-trash-can"></i></small>
        </button>
      </div>
    </div>
  </div>


  <!-- Modal -->
  <div class="modal fade" id="modalDeleteUti{{ utilisateurDto.id }}" data-bs-backdrop="static" data-bs-keyboard="false"
       tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="staticBackdropLabel">Confirmation</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">x</span>
          </button>
        </div>
        <div class="modal-body">
          Etes-vous sûr de vouloir supprimer cette utilisateur?
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            <i class="fa-solid fa-ban"></i>Annuler</button>
          <button type="button" class="btn btn-danger" data-bs-dismiss="modal" (click)="confirmerEtSupprimerArt()">
            <i class="fa-solid fa-trash-can"></i>Supprimer</button>
        </div>
      </div>
    </div>
  </div>
</div>
