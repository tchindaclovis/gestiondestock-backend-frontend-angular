<div class="modal fade show" style="display: block; background: rgba(0,0,0,0.5);"
     tabindex="-1" role="dialog">
  <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
    <div class="modal-content shadow-lg">

      <div class="modal-header bg-light">
        <h5 class="modal-title">
          <i class="fa-solid fa-circle-info text-primary"></i>&nbsp; Information du {{ origin }}
        </h5>
        <button type="button" class="btn-close" (click)="cancelClick()" aria-label="Close"></button>
      </div>

      <div class="modal-body p-4" style="max-height: 75vh; overflow-y: auto;">

        <div class="text-center mb-4">
          <button (click)="fileInput.click()" class="btn p-0 border-0 bg-transparent">
            <img [src]="clientFournisseur.photo ? clientFournisseur.photo : 'assets/new_product.png'"
                 [src]="imgUrl"
                 class="rounded-circle shadow-sm"
                 width="150px" height="150px"
                 style="object-fit: cover; border: 3px solid #007bff; cursor: pointer;"/>
            <input hidden type="file" #fileInput (change)="onFileInput(fileInput.files)" accept="image/*">
            <p class="text-muted small mt-2">Cliquer pour changer la photo</p>
          </button>
        </div>

        <hr>

        <div class="alert alert-danger" *ngIf="errorMsg.length > 0">
          <div *ngFor="let msg of errorMsg">
            <span> {{ msg }} </span>
          </div>
        </div>

        <form>
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label small fw-bold">Nom</label>
              <input type="text" class="form-control" placeholder="Nom" name="nom" [(ngModel)]="clientFournisseur.nom">
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">Adresse 1</label>
              <input type="text" class="form-control" placeholder="Rue, numéro..." name="adresse1" [(ngModel)]="adresseDto.adresse1">
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label small fw-bold">Statut ou Prénom</label>
              <input type="text" class="form-control" placeholder="Statut ou Prénom" name="statut" [(ngModel)]="clientFournisseur.statut">
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">Adresse 2</label>
              <input type="text" class="form-control" placeholder="Appartement, étage (optionnel)" name="adresse2" [(ngModel)]="adresseDto.adresse2">
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label small fw-bold">E-mail</label>
              <input type="email" class="form-control" placeholder="exemple@mail.com" name="email" [(ngModel)]="clientFournisseur.email">
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">Ville</label>
              <input type="text" class="form-control" placeholder="Ville" name="ville" [(ngModel)]="adresseDto.ville">
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label small fw-bold">Téléphone</label>
              <input type="text" class="form-control" placeholder="Numéro de téléphone" name="numtel" [(ngModel)]="clientFournisseur.numTel">
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">Code postal</label>
              <input type="text" class="form-control" placeholder="Code postal" name="codepostal" [(ngModel)]="adresseDto.codePostale">
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 offset-md-6">
              <label class="form-label small fw-bold">Pays</label>
              <input type="text" class="form-control" placeholder="Pays" name="pays" [(ngModel)]="adresseDto.pays">
            </div>
          </div>
        </form>
      </div>

      <div class="modal-footer bg-light">
        <button type="button" class="btn btn-danger me-2" (click)="cancelClick()">
          <i class="fa-solid fa-ban"></i>&nbsp; Annuler
        </button>
        <button type="button" class="btn btn-primary" (click)="enregistrer()">
          <i class="fa-solid fa-save"></i>&nbsp; Enregistrer
        </button>
      </div>

    </div>
  </div>
</div>
