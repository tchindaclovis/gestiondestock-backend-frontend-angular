<div class="col pt-3 pb-3 p-5">
  <div class="col-md-12 mb-3">
    <button (click)="fileInput.click()" style="background-color: transparent; border: none">
      <img [src]="clientFournisseur.photo ? clientFournisseur.photo : 'assets/new_product.png'" [src]="imgUrl"
           class="rounded-circle" width="200px" height="200px"
           style="object-fit: cover; border: 2px solid #007bff; cursor: pointer;"/>
      <input hidden type="file" #fileInput (change)="onFileInput(fileInput.files)">
    </button>
  </div>
  <hr>
  <div class="col-md-12">
    <div class="col-md-12">
      <h2><i class="fa-solid fa-circle-info blue-color"></i>&nbsp;Information du {{origin}}</h2>
    </div>
    <div class="alert alert-danger" *ngIf="errorMsg.length > 0">
      <div *ngFor="let msg of errorMsg">
        <span> {{ msg }} </span>
      </div>
    </div>

    <div class="col-md-12">
      <form action="">

        <div class="row mb-3">
          <div class="col">
            <input type="text" class="form-control" placeholder="Nom" aria-label="Nom"
            name="nom" [(ngModel)]="clientFournisseur.nom">
          </div>
          <div class="col">
            <input type="text" class="form-control" placeholder="Adresse 1" aria-label="Adresse 1"
             name="adresse1" [(ngModel)]="adresseDto.adresse1">
          </div>
        </div>

        <div class="row mb-3">
          <div class="col">
            <input type="text" class="form-control" placeholder="Prenom" aria-label="Prenom"
             name="prenom" [(ngModel)]="clientFournisseur.prenom">
          </div>
          <div class="col">
            <input type="text" class="form-control" placeholder="Adresse 2" aria-label="Adresse 2"
             name="adresse2" [(ngModel)]="adresseDto.adresse2">
          </div>
        </div>

        <div class="row mb-3">
          <div class="col">
            <input type="text" class="form-control" placeholder="E-mail" aria-label="E-mail"
            name="email" [(ngModel)]="clientFournisseur.email">
          </div>
          <div class="col">
            <input type="text" class="form-control" placeholder="Ville" aria-label="Ville"
            name="ville" [(ngModel)]="adresseDto.ville">
          </div>
        </div>

        <div class="row mb-3">
          <div class="col">
            <input type="text" class="form-control" placeholder="Telephone" aria-label="Telephone"
            name="numtel" [(ngModel)]="clientFournisseur.numTel">
          </div>
          <div class="col">
            <input type="text" class="form-control" placeholder="Code postal" aria-label="Code postal"
            name="codepostal" [(ngModel)]="adresseDto.codePostale">
          </div>
        </div>

        <div class="row mb-3">
          <div class="col">&nbsp;
          </div>
          <div class="col">
            <input type="text" class="form-control" placeholder="Pays" aria-label="Pays"
             name="pays" [(ngModel)]="adresseDto.pays">
          </div>
        </div>
      </form>
    </div>
  </div>
  <div class="col-md-12 text-end">
    <button class="btn btn-danger me-3" (click)="cancelClick()">
      <i class="fa-solid fa-ban"></i>&nbsp;
      Annuler
    </button>
    <button class="btn btn-primary" (click)="enregistrer()">
      <i class="fa-solid fa-save"></i>&nbsp;
      Enregistrer
    </button>
  </div>
</div>
