
<div class="row mb-1 mr-0 border">

  <div class="col-md-2 border-end mb-1 mt-1">
    <div class="row text-center">
      <div class="col-md-11">
        <small>
          {{ mvtStockDto.codeSource || 'N/A' }}
        </small>
      </div>
    </div>
  </div>

  <div class="col-md-2 border-end mb-1 mt-1">
    <div class="row text-center">
      <div class="col-md-11">
        <small>
          {{ mvtStockDto.dateMvt | date:'dd/MM/yyyy HH:mm' }}
        </small>
      </div>
    </div>
  </div>

  <div class="col-md-2 border-end mb-1 mt-1">
    <div class="row">
      <div class="col-md-12 text-center">
        <small [ngClass]="isEntree ? 'text-success' : 'text-danger'">
          {{ mvtStockDto.quantite | number:'1.0-0':'fr' }}
        </small>
      </div>
    </div>
  </div>

  <div class="col-md-3 border-end mb-1 mt-1">
    <div class="row">
      <div class="col-md-12 text-center">
        <small [ngClass]="isEntree ? 'text-success' : 'text-danger'">
          {{ typeMvtLabel }}
        </small>

      </div>
    </div>
  </div>

  <div class="col-md-3 mb-1 mt-1">
    <div class="row text-center">
      <small class="text-primary">
         {{ sourceMvtLabel }}
      </small>
    </div>
  </div>
</div>
