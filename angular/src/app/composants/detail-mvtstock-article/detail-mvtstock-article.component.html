<!--photo article-->
<div class="row mb-1 mr-0 border" >
  <div class="col-md-1 border-end p-1 text-center">
    <img [src]="articleDto.photo ? articleDto.photo : 'assets/product.png'"
         width="100px" height="100px">
  </div>

  <!--  details article-->
  <div class="col-md-4 border-end mb-1 mt-1">
    <div class="col">
      <div class="row">
        <div class="col-md-1"><i class="fa-solid fa-circle-info blue-color"></i></div>
        <div class="col-md-11">{{ articleDto.codeArticle }}</div>
      </div>
      <div class="row">
        <div class="col-md-1"><i class="fa-solid fa-circle-info blue-color"></i></div>
        <div class="col-md-11">{{ articleDto.designation }}</div>
      </div>
      <div class="row">
        <div class="col-md-1"><i class="fa-solid fa-dollar-sign blue-color"></i></div>
        <div class="col-md-11">{{ articleDto.prixUnitaireHt | currency:'XAF':'symbol':'1.0-0':'fr' }}</div>
      </div>
      <div class="row">
        <div class="col-md-1"><i class="fa-solid fa-dollar-sign blue-color"></i></div>
        <div class="col-md-11">{{ articleDto.prixUnitaireTtc | currency:'XAF':'symbol':'1.0-0':'fr' }}</div>
      </div>
    </div>
  </div>

  <!--  details stock-->
  <div class="col-md-3 border-end mb-1 mt-1">
    <div class="col-md-10 text-center">
      <div class="row">
        <div class="col-md-12">
          <h3 class="text-muted">Stock actuel</h3>
        </div>
        <div class="col-md-12">
          <h3 [ngClass]="{
          'text-danger': stockGlobal <= 0,
          'text-warning': stockGlobal <= 10,
          'text-success': stockGlobal > 10
          }">
            {{ stockGlobal | number:'1.0-0':'fr'}}
          </h3>
        </div>
      </div>
    </div>
  </div>

  <div class="col-md-3 mb-1 mt-1 ">
    <div class="row">
      <div class="col-md-12 text-center">
        <button type="button" class="btn btn-link souligner-au-survol"
                data-toggle="modal" data-target="#exampleModal">
          <i class="fa-solid fa-up-down"></i>&nbsp;Correction de stock
        </button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel"
     aria-hidden="true" autofocus>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLabel">Correction de stock</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form>
          <div class="form-group">
            <input type="text" class="form-control" placeholder="Quantite">
          </div>
          <div class="form-group">
            <select class="form-control">
              <option>Correction positive</option>
              <option>Correction negative</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-danger" data-dismiss="modal"><i class="fas fa-ban"></i>&nbsp;Annuler</button>
        <button type="button" class="btn btn-primary"> <i class="fas fa-save"></i>&nbsp;Enregistrer</button>
      </div>
    </div>
  </div>
</div>
