<div class="row mb-1 mr-0 border">
  <div class="col-md-1 border-end p-1 text-center">
    <img [src]="articleDto.photo ? articleDto.photo : 'assets/product.png'" width="100px" height="100px">
  </div>

  <div class="col-md-4 border-end mb-1 mt-1">
    <div class="col">
      <div class="row">
        <div class="col-md-1"><i class="fa-solid fa-circle-info blue-color"></i></div>
        <div class="col-md-11">{{ articleDto.codeArticle }}</div>
      </div>
      <div class="row">
        <div class="col-md-1"><i class="fa-solid fa-circle-info blue-color"></i></div>
        <div class="col-md-11">{{ articleDto.designation }}</div>
      </div>
      <div class="row">
        <div class="col-md-1"><i class="fa-solid fa-dollar-sign blue-color"></i></div>
        <div class="col-md-11">{{ articleDto.prixVenteUnitaireTtc | currency:'XAF':'symbol':'1.0-0':'fr' }}</div>
      </div>
    </div>
  </div>

  <div class="col-md-3 border-end mb-1 mt-1">
    <div class="col-md-10 text-center">
      <h3 class="text-muted">Stock actuel</h3>
      <h3 [ngClass]="{
          'text-danger': stockGlobal <= 0,
          'text-warning': stockGlobal <= 10 && stockGlobal > 0,
          'text-success': stockGlobal > 10
          }">
        {{ stockGlobal | number:'1.0-0':'fr' }}
      </h3>
    </div>
  </div>

  <div class="col-md-3 mb-1 mt-1 text-center">
    <button type="button" class="btn btn-link text-decoration-none text-danger" data-bs-toggle="modal"
            [attr.data-bs-target]="'#modalCorrection' + articleDto.id">
      <i class="fa-solid fa-up-down"></i>&nbsp;Correction de stock
    </button>
  </div>



  <!--Modal de correction-->
  <div class="modal fade" [id]="'modalCorrection' + articleDto.id"
       data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
       aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Correction de stock : {{ articleDto.designation }}</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <div class="modal-body">
          <form>
            <div class="form-group mb-3">
              <label>Quantité</label>
              <input type="number" class="form-control" name="quantite" placeholder="Ex: 10"
                     [(ngModel)]="mvtStockDto.quantite">
            </div>
            <div class="form-group">
              <label>Type de correction</label>
              <select class="form-select form-control" name="typeMvt" [(ngModel)]="mvtStockDto.typeMvt">
                <option value="CORRECTION_POS">Correction positive (Ajout)</option>
                <option value="CORRECTION_NEG">Correction négative (Retrait)</option>
              </select>
            </div>
          </form>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            <i class="fa-solid fa-ban"></i>&nbsp;Annuler
          </button>
          <button type="button" class="btn btn-primary" data-bs-dismiss="modal" (click)="enregistrerCorrection()">
            <i class="fas fa-save"></i>&nbsp;Enregistrer
          </button>
        </div>
      </div>
    </div>
  </div>

</div>
